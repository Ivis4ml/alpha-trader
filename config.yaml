strategy:
  auto_regime: true
  dte_range:
  - 3
  - 21
  min_premium: 0.25
  min_open_interest: 50
  max_spread_pct: 20
  max_contracts_pct: 75
  blackout_earnings_days: 7
  target_delta: 0.2
  preferred_dte: 10
  scoring_weights:
    income: 0.35
    assignment_risk: 0.30
    execution_quality: 0.20
    event_risk: 0.15
  profit_take_pct: 50
  max_loss_multiple: 2.0
  roll_when_dte: 5
  avoid_earnings: true
  max_short_calls_per_symbol: 3
  regimes:
    conservative:
      delta_range:
      - 0.08
      - 0.15
      vix_below: 15
      label: "Low IV \u2014 tighter strikes, minimal assignment risk"
    balanced:
      delta_range:
      - 0.15
      - 0.25
      vix_range:
      - 15
      - 25
      label: "Normal IV \u2014 good premium vs safety tradeoff"
    aggressive:
      delta_range:
      - 0.25
      - 0.35
      vix_above: 25
      label: "High IV \u2014 fat premiums, accept higher assignment risk"
income_goal:
  weekly_target: 1500
  annual_target: 78000
  evaluation: rolling_average
  review_interval: biweekly
  tolerate_miss_weeks: true
  min_floor_week: 0
  catchup_cap_pct: 200
schedule:
  timezone: US/Pacific
  morning: 08:00
  midday: '12:00'
language: zh
